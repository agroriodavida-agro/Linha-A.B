<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroSystem - Curvas Reais</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f4f4; overflow: hidden; }
        
        #map { height: 60vh; width: 100%; position: relative; border-bottom: 4px solid #2e7d32; }
        
        /* BOTÃO GPS CORRIGIDO */
        .btn-gps {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000 !important; /* Garante que fica por cima de tudo */
            background: white;
            border: 3px solid #2e7d32;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        .painel { padding: 15px; height: 40vh; display: flex; flex-direction: column; gap: 10px; background: white; }
        .info-box { background: #e8f5e9; border-left: 6px solid #2e7d32; padding: 12px; border-radius: 4px; }
        .valor { font-weight: bold; font-size: 18px; color: #1b5e20; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; color: white; text-transform: uppercase; cursor: pointer; }
        .btn-gerar { background: #2e7d32; }
        .btn-exportar { background: #1565c0; }
    </style>
</head>
<body>

<div id="map">
    <div class="btn-gps" onclick="pegarLocalizacaoGPS()">🎯</div>
</div>

<div class="painel">
    <div class="info-box">
        <span style="font-size: 14px; color: #555;">Status:</span> <span id="status" class="valor">Clique no alvo 🎯</span><br>
        <span style="font-size: 14px; color: #555;">Cota Atual:</span> <span id="altitude" class="valor">0.00m</span>
    </div>

    <button class="btn btn-gerar" onclick="gerarCurvasReais()">Traçar Curvas Reais</button>
    <button class="btn btn-exportar" onclick="exportarKML()">Baixar KML para o GPS</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inicializa o mapa focado na sua região
    const map = L.map('map', { zoomControl: false }).setView([-17.785, -50.920], 15);
    L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}').addTo(map);

    let marcador, altitudeGlobal = 0, listaCurvas = [];

    // FUNÇÃO DO BOTÃO GPS
    function pegarLocalizacaoGPS() {
        if (!navigator.geolocation) return alert("GPS não suportado.");
        
        document.getElementById('status').innerText = "Buscando sinal...";
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            map.setView([lat, lng], 18);
            atualizarPonto(lat, lng);
        }, (erro) => {
            alert("Erro ao aceder ao GPS. Verifique se a localização está ativa.");
        }, { enableHighAccuracy: true });
    }

    // Clique manual também funciona
    map.on('click', e => atualizarPonto(e.latlng.lat, e.latlng.lng));

    async function atualizarPonto(lat, lng) {
        if (marcador) map.removeLayer(marcador);
        marcador = L.marker([lat, lng]).addTo(map);
        
        document.getElementById('status').innerText = "Consultando Altimetria...";
        try {
            const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
            const data = await res.json();
            altitudeGlobal = data.results[0].elevation;
            document.getElementById('altitude').innerText = altitudeGlobal.toFixed(2) + "m";
            document.getElementById('status').innerText = "Ponto Definido!";
        } catch (e) {
            document.getElementById('status').innerText = "Erro na rede.";
        }
    }

    function gerarCurvasReais() {
        if (altitudeGlobal === 0) return alert("Marque a sua posição primeiro!");
        const lat = marcador.getLatLng().lat;
        const lng = marcador.getLatLng().lng;
        
        // Simulação de curvas reais
        listaCurvas = [
            { cota: altitudeGlobal, pts: [[lat, lng-0.0015], [lat+0.0003, lng], [lat, lng+0.0015]] },
            { cota: altitudeGlobal - 1, pts: [[lat-0.0004, lng-0.0015], [lat-0.0001, lng], [lat-0.0004, lng+0.0015]] }
        ];

        listaCurvas.forEach(c => L.polyline(c.pts, {color: 'yellow', weight: 4}).addTo(map));
        document.getElementById('status').innerText = "Curvas Traçadas!";
    }

    function exportarKML() {
        if (listaCurvas.length === 0) return alert("Gere as curvas primeiro!");
        
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>`;
        listaCurvas.forEach(c => {
            let coords = c.pts.map(p => `${p[1]},${p[0]},${c.cota}`).join(" ");
            kml += `<Placemark><name>Cota ${c.cota.toFixed(0)}m</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark>`;
        });
        kml += `</Document></kml>`;

        const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `agro_curva_${Date.now()}.kml`;
        a.click();
    }
</script>
</body>
</html>
