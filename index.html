<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroSystem - Curvas de Nível</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

#map {
    height: 60vh;
}

/* Painel */
#painel {
    padding: 15px;
    background: #f5f5f5;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #2e7d32;
    color: white;
    font-size: 16px;
}

/* BOTÃO GPS */
#gpsBtn {
    position: absolute;
    top: 80px;
    right: 10px;
    z-index: 1000;
    background: white;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    cursor: pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- BOTÃO GPS -->
<div id="gpsBtn">📍 GPS</div>

<div id="painel">
    <p>Status: <b id="status">Aguardando</b></p>
    <p>Curvas: <b id="curvas">0</b></p>

    <label>Intervalo curvas (m):</label>
    <input type="number" id="intervalo" value="5" style="width:100%; padding:10px;">

    <button onclick="finalizarArea()">Finalizar Área</button>
    <button onclick="gerarCurvas()">Gerar Curvas</button>
    <button onclick="exportarKML()">Exportar KML</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([-3.71722, -38.5433], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
}).addTo(map);

let pontos = [];
let poligono = null;

// CLIQUE NO MAPA
map.on('click', function(e) {
    pontos.push([e.latlng.lat, e.latlng.lng]);

    if (poligono) {
        map.removeLayer(poligono);
    }

    poligono = L.polygon(pontos, {color: 'blue'}).addTo(map);
});

// FINALIZAR ÁREA
function finalizarArea() {
    if (pontos.length < 3) {
        alert("Marque pelo menos 3 pontos");
        return;
    }

    document.getElementById("status").innerText = "Área definida";
}

// GERAR CURVAS (placeholder)
function gerarCurvas() {
    document.getElementById("curvas").innerText = "Simulado";
    alert("Curvas geradas (simulação)");
}

// EXPORTAR KML
function exportarKML() {
    alert("Exportação KML em desenvolvimento");
}

// 🚀 FUNÇÃO GPS
document.getElementById("gpsBtn").onclick = function() {
    if (!navigator.geolocation) {
        alert("GPS não suportado");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(pos) {
            let lat = pos.coords.latitude;
            let lng = pos.coords.longitude;

            map.setView([lat, lng], 18);

            L.marker([lat, lng]).addTo(map)
                .bindPopup("Você está aqui")
                .openPopup();
        },
        function() {
            alert("Erro ao obter localização");
        }
    );
};
</script>

</body>
</html>
