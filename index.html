<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroSystem Pro - Linhas A-B</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #121212; color: white; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; background: #222; }
        .controls { background: #1e1e1e; padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .row { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; font-weight: bold; border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 14px; }
        .btn-a { background: #e74c3c; }
        .btn-b { background: #3498db; }
        .btn-gps { background: #f39c12; }
        .btn-gerar { background: #27ae60; flex: 1.5; }
        .status-bar { background: #2c3e50; padding: 10px; border-radius: 5px; font-size: 12px; border-left: 4px solid #f39c12; min-height: 40px; }
        input { background: #333; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; font-size: 16px; width: 100%; text-align: center; }
        label { font-size: 11px; color: #aaa; margin-bottom: -5px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
    <div class="status-bar" id="status">Aguardando sinal... (Use via HTTPS no GitHub)</div>
    
    <div class="row">
        <button class="btn-a" onclick="marcarPonto('A')">Marcar A</button>
        <button class="btn-b" onclick="marcarPonto('B')">Marcar B</button>
    </div>

    <label>Espaçamento entre Linhas (metros):</label>
    <input type="number" id="espacamento" value="0.45" step="0.01">

    <div class="row">
        <button class="btn-gps" onclick="focarGPS()">🎯 Localizar</button>
        <button class="btn-gerar" onclick="gerarLinhas()">Gerar Linhas de Plantio</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Inicializa o mapa
    var map = L.map('map', { zoomControl: false }).setView([-15.79, -47.88], 4);

    // Camada Satélite Google Estável
    L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        maxZoom: 21,
        attribution: 'Google Satélite'
    }).addTo(map);

    var pontoA, pontoB;
    var camadaLinhas = L.layerGroup().addTo(map);
    var marcadorUsuario = L.circleMarker([0,0], {radius: 8, color: '#3498db', fillOpacity: 1, weight: 3}).addTo(map);

    function focarGPS() {
        if (!navigator.geolocation) return alert("GPS não suportado.");

        document.getElementById('status').innerText = "Buscando posição precisa...";
        
        navigator.geolocation.getCurrentPosition(function(pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            marcadorUsuario.setLatLng([lat, lng]);
            map.flyTo([lat, lng], 18);
            document.getElementById('status').innerText = "Localizado com sucesso!";
        }, function(err) {
            alert("Erro de GPS: " + err.message + ". Certifique-se de estar usando HTTPS.");
        }, { enableHighAccuracy: true });
    }

    function marcarPonto(tipo) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            var coord = [pos.coords.latitude, pos.coords.longitude];
            if (tipo === 'A') {
                pontoA = coord;
                L.marker(coord).addTo(map).bindPopup("Início (A)").openPopup();
                document.getElementById('status').innerText = "Ponto A marcado!";
            } else {
                pontoB = coord;
                L.marker(coord).addTo(map).bindPopup("Fim (B)").openPopup();
                document.getElementById('status').innerText = "Ponto B marcado! Agora gere as linhas.";
            }
        });
    }

    function gerarLinhas() {
        if (!pontoA || !pontoB) return alert("Marque A e B primeiro.");
        camadaLinhas.clearLayers();
        
        var esp = parseFloat(document.getElementById('espacamento').value);
        var lat1 = pontoA[0], lon1 = pontoA[1], lat2 = pontoB[0], lon2 = pontoB[1];
        
        // Ângulo da linha
        var angulo = Math.atan2(lat2 - lat1, (lon2 - lon1) * Math.cos(lat1 * Math.PI / 180));
        var anguloPerp = angulo + Math.PI / 2;
        
        // Conversão metros para coordenadas
        var offLat = (esp / 111320) * Math.sin(anguloPerp);
        var offLon = (esp / (111320 * Math.cos(lat1 * Math.PI / 180))) * Math.cos(anguloPerp);

        // Gera 30 linhas para cobrir o talhão
        for (var i = -30; i <= 30; i++) {
            var nLat1 = lat1 + (offLat * i), nLon1 = lon1 + (offLon * i);
            var nLat2 = lat2 + (offLat * i), nLon2 = lon2 + (offLon * i);
            L.polyline([[nLat1, nLon1], [nLat2, nLon2]], {
                color: i === 0 ? 'yellow' : 'white', 
                weight: i === 0 ? 3 : 1, 
                dashArray: i === 0 ? null : '5,5',
                opacity: 0.6
            }).addTo(camadaLinhas);
        }
        document.getElementById('status').innerText = "Linhas geradas no Satélite.";
    }
</script>
</body>
</html>
